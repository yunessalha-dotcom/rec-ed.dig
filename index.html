<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidadania Digital 2026 - Detector de Deepfakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container-principal">
        <section class="card-conteudo">
            <h2>🔍 Quiz de Percepção Digital</h2>
            <p>Avalie a frase: <em>"Deepfakes de áudio (clonagem de voz) são fáceis de detectar porque a voz gerada por IA nunca tem entonação emocional."</em></p>

            <form id="formulario-quiz">
                <fieldset class="grupo-opcoes">
                    <legend>Essa afirmação é Verdadeira ou Falsa?</legend>
                    
                    <label class="opcao-resposta">
                        <input type="radio" name="resposta_usuario" value="verdadeiro">
                        <span>Verdadeiro (A IA não replica emoções)</span>
                    </label>
                    
                    <label class="opcao-resposta">
                        <input type="radio" name="resposta_usuario" value="falso">
                        <span>Falso (As IAs atuais já replicam choros, risos e pausas respiratórias)</span>
                    </label>
                </fieldset>

                <button type="submit" class="botao-acao">Enviar Resposta</button>
            </form>

            <div id="painel-resultado" class="alerta-resultado ocultar">
                <h3 id="titulo-resultado"></h3>
                <p id="mensagem-resultado"></p>
                <div class="estatistica">
                    Tentativas nesta sessão: <span id="contador-tentativas">0</span>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
